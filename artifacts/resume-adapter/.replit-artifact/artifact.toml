kind = "web"
previewPath = "/"
title = "акразия"
version = "1.0.0"
id = "artifacts/resume-adapter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25788

[services.development]
run = "pnpm --filter @workspace/resume-adapter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume-adapter", "run", "build" ]
publicDir = "artifacts/resume-adapter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25788"
BASE_PATH = "/"